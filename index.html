  <!--
      Content Security Policy (CSP)
      ─────────────────────────────────────────────────────────────────────
      La CSP se inyecta como header HTTP desde vite.config.ts (desarrollo)
      y desde el servidor nginx/Apache (producción).

      Los headers HTTP tienen precedencia sobre meta tags, y además
      permiten leer variables de entorno para incluir la URL del backend
      dinámicamente según el entorno.

      Ver vite.config.ts → server.headers para la configuración activa.
      ─────────────────────────────────────────────────────────────────────
    -->

  <!-- Impide que el navegador detecte automáticamente tipos MIME incorrectos -->
  <!-- Nota: X-Content-Type-Options y X-Frame-Options se configuran como    -->
  <!-- headers HTTP en vite.config.ts (desarrollo) y en nginx (producción). -->
</head>

</body>
