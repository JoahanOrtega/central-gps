# ═══════════════════════════════════════════════════════════════════════════
# nginx — reverse proxy del frontend al backend + sirve los assets estáticos
# ═══════════════════════════════════════════════════════════════════════════
#
# Rutas:
#   /auth/*, /users/*, /units/*, ...  → proxy a api:5000
#   /health                           → proxy a api:5000/ (health check)
#   /*.html, /*.css, /*.js, etc.      → archivos estáticos del build de Vite
#   fallback                          → /index.html (SPA routing)
#
# Por qué same-origin: frontend y backend salen por localhost:8080. Las
# cookies SameSite=Lax viajan sin fricción, sin CORS.
# ═══════════════════════════════════════════════════════════════════════════

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # ─── Proxy a la API ─────────────────────────────────────────────────────
  # Rutas de blueprints del backend. Si agregas un blueprint nuevo,
  # añadilo acá o el frontend no podrá llamarlo.
  location ~ ^/(auth|users|units|poi|pois|poi-groups|telemetry|monitor|catalogs|company|companies|clients|admin-erp|erp)(/|$) {
    proxy_pass http://api:5000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Timeouts generosos — reportes largos pueden tardar
    proxy_read_timeout 300s;
    proxy_connect_timeout 30s;
  }

  # ─── Health check del backend ───────────────────────────────────────────
  # El endpoint `/` del backend responde {"message": "..."}. Lo exponemos
  # bajo /health para poder verificar salud sin confundirlo con la raíz
  # del frontend (que sirve index.html del SPA).
  #
  # Uso: curl http://localhost:8080/health
  location /health {
    proxy_pass http://api:5000/;
    proxy_set_header Host $host;
    access_log off;
  }

  # ─── SPA — archivos estáticos y fallback al index ────────────────────────
  # Si el archivo/directorio existe, lo sirve. Si no (ej: rutas de React
  # Router como /login, /home/catalogs/units), devuelve index.html para
  # que el cliente maneje el routing.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # ─── Cache de assets con hash ──────────────────────────────────────────
  # Vite genera archivos con hash en el nombre (ej: app.abc123.js).
  # Cache inmutable por 1 año — cuando cambia el código, cambia el hash.
  location ~* \.(js|css|woff2?|png|jpg|jpeg|gif|svg|ico)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }
}